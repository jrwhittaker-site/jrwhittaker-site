<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You | Jonathan R. Whittaker</title>
  <meta name="robots" content="noindex">

  <style>

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #0f0f0f;
      color: #e0e0e0;
      font-family: system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif;
      font-size: 18px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    a { color: inherit; }

    nav {
      height: 44px;
      display: flex;
      align-items: center;
      padding: 0 40px;
      border-bottom: 1px solid #1e1e1e;
    }

    .nav-wordmark {
      font-size: 15px;
      font-weight: 400;
      letter-spacing: 0.12em;
      color: #e0e0e0;
      text-decoration: none;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      max-width: 560px;
      padding: 40px;
    }

    .thanks-label {
      display: inline-block;
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.3em;
      color: #50FA7B;
      text-transform: uppercase;
      margin-bottom: 28px;
      border-bottom: 1px solid #50FA7B;
      padding-bottom: 6px;
    }

    .thanks-heading {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 44px;
      font-weight: 700;
      line-height: 1.15;
      margin-bottom: 20px;
    }

    .thanks-body {
      font-size: 18px;
      color: #b0b0b0;
      line-height: 1.7;
      margin-bottom: 32px;
    }

    .thanks-back {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: underline;
      text-underline-offset: 3px;
      color: #e0e0e0;
      transition: color 0.2s;
    }

    .thanks-back:hover { color: #50FA7B; }

  </style>
</head>
<body>

  <nav>
    <a class="nav-wordmark" href="/">Jonathan R. Whittaker</a>
  </nav>

  <main>
    <span class="thanks-label">Thank You</span>
    <h1 class="thanks-heading">Your inquiry is in.</h1>
    <p class="thanks-body">I respond to every inquiry personally, usually within two business days. In the meantime, feel free to look around or reach out directly if anything is time sensitive.</p>
    <a class="thanks-back" href="/">Back to Education &amp; Consulting</a>
  </main>

</body>
</html>
